<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruan Lisboa | Arquiteto de Fronteiras</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Hero: Zoom Out Inicial */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #title-container { text-align: center; }
        h1 { font-size: 5rem; margin: 0; }
        
        /* Horizontal Scroll Area */
        .panel-container { display: flex; height: 100vh; width: 400vw; }
        .panel { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <section class="hero" id="hero">
        <div id="title-container">
            <h1>Ruan Lisboa</h1>
            <p>Arquiteto de Fronteiras</p>
        </div>
    </section>

    <div id="horizontal-wrapper">
        <div class="panel-container" id="panels">
            <section class="panel"><h2>🔭 Frontier Science</h2></section>
            <section class="panel"><h2>⚙️ Sistemas Ciberfísicos</h2></section>
            <section class="panel"><h2>🧠 Dados & Inteligência</h2></section>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Zoom Out do Título
        gsap.to("#title-container", {
            scale: 0.4, opacity: 0,
            scrollTrigger: { trigger: "#hero", start: "top top", end: "bottom top", scrub: 1 }
        });

        // 2. Scroll Horizontal Fluido
        let panels = gsap.utils.toArray(".panel");
        gsap.to(panels, {
            xPercent: -100 * (panels.length - 1),
            ease: "none",
            scrollTrigger: {
                trigger: "#horizontal-wrapper",
                pin: true, // Trava o scroll vertical para o horizontal deslizar
                scrub: 1, // Suavidade da rolagem
                start: "top top",
                end: "+=3000" // Tempo de rolagem
            }
        });
    </script>
</body>
</html>
