<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ruan Lisboa | Arquiteto de Fronteiras</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden; /* Importante: esconde a barra de rolagem padrão */
            background: #050505; color: #fff;
            font-family: 'Inter', sans-serif;
        }

        /* Container que fará o "Full-Page Snap" */
        #viewport {
            height: 100vh;
            width: 100vw;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
        }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
        }

        /* Efeito de Zoom no H1 da Hero */
        #hero-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 5rem;
            transition: transform 0.5s ease-out;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <!-- Tela 1: Zoom -->
        <section>
            <h1 id="hero-text">Ruan Lisboa</h1>
        </section>

        <!-- Tela 2: Manifesto -->
        <section>
            <p>"A complexidade é apenas uma ignorância temporária..."</p>
        </section>

        <!-- Tela 3: Ocupações -->
        <section>
            <h2>Frontier Science | R&D | IA</h2>
        </section>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const hero = document.getElementById('hero-text');

        viewport.addEventListener('scroll', () => {
            // Efeito de Zoom: quanto mais rola, menor o texto fica
            let scrollPos = viewport.scrollTop;
            let scale = Math.max(0.2, 1 - (scrollPos / 300));
            hero.style.transform = `scale(${scale})`;
        });
    </script>
</body>
</html>
