<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; }

        /* Container que mantém o texto fixo no centro enquanto o resto rola */
        .hero-container { 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center;
            width: 100%;
            transition: opacity 0.5s ease;
        }

        h1 { font-size: 4rem; margin: 0; }
        
        /* Espaçamento grande para criar o scroll */
        .spacer { height: 300vh; }

        .content-section { padding: 100px 20px; text-align: center; font-size: 2rem; }
    </style>
</head>
<body>

    <div class="hero-container" id="hero">
        <h1>Ruan Lisboa</h1>
        <p>A complexidade é uma ignorância temporária.</p>
    </div>

    <!-- Espaço para rolar -->
    <div class="spacer"></div>

    <section class="content-section">
        <h2>Frontier Science</h2>
        <p>Conteúdo dos projetos aqui...</p>
    </section>

    <script>
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const hero = document.getElementById('hero');
            
            // Zoom suave: o texto encolhe um pouco ao rolar
            const scale = Math.max(0.3, 1 - (scroll / 400));
            hero.style.transform = `translate(-50%, -50%) scale(${scale})`;
            
            // Fade out suave
            hero.style.opacity = Math.max(0, 1 - (scroll / 200));
        });
    </script>
</body>
</html>
