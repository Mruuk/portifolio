<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ruan Lisboa | Arquiteto de Fronteiras</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Zoom-out Hero */
        .hero { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 1; transition: transform 0.5s ease-out;
        }
        .hero h1 { font-size: 5rem; transition: transform 0.8s ease; }

        /* Container Lateral */
        .horizontal-container {
            display: flex; flex-direction: row;
            width: 400vw; /* 4 slides de 100vw */
            height: 100vh;
        }
        .slide { 
            width: 100vw; height: 100vh; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid #222;
        }
    </style>
</head>
<body>

    <section class="hero" id="hero">
        <h1>Ruan Lisboa</h1>
    </section>

    <div class="horizontal-container" id="scroll-container">
        <section class="slide"><h2>O Manifesto</h2><p>A complexidade é uma ignorância temporária.</p></section>
        <section class="slide"><h2>🔭 Frontier Science</h2><p>mebe & SEEV</p></section>
        <section class="slide"><h2>⚙️ Sistemas R&D</h2><p>LARA & Automação</p></section>
        <section class="slide"><h2>🧠 IA</h2><p>OncoTech</p></section>
    </div>

    <script>
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const hero = document.getElementById('hero');
            
            // Efeito Zoom Out no título
            const scale = Math.max(0.5, 1 - scroll / 500);
            hero.style.transform = `scale(${scale})`;
            
            // Transição para o Scroll Lateral
            if (scroll > window.innerHeight) {
                const horizontal = document.getElementById('scroll-container');
                horizontal.style.transform = `translateX(-${scroll - window.innerHeight}px)`;
            }
        });
    </script>
</body>
</html>
