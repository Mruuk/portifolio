<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .section {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        #hero { z-index: 10; }
        #projeto1 { z-index: 9; opacity: 0; }
        
        h1 { font-size: 5rem; }
    </style>
</head>
<body>

    <div class="section" id="hero">
        <h1>Ruan Lisboa</h1>
        <p>A complexidade é uma ignorância temporária.</p>
    </div>

    <div class="section" id="projeto1">
        <h2>🔭 Frontier Science</h2>
        <p>Modelagem lógica: mebe & SEEV</p>
    </div>

    <script>
        let currentSection = 0;
        const sections = document.querySelectorAll('.section');

        window.addEventListener('wheel', (event) => {
            if (event.deltaY > 0 && currentSection < sections.length - 1) {
                // Scroll para baixo: esconde o atual, mostra o próximo
                sections[currentSection].style.opacity = 0;
                sections[currentSection].style.transform = 'scale(0.8)';
                currentSection++;
                sections[currentSection].style.opacity = 1;
                sections[currentSection].style.transform = 'scale(1)';
            } else if (event.deltaY < 0 && currentSection > 0) {
                // Scroll para cima
                sections[currentSection].style.opacity = 0;
                currentSection--;
                sections[currentSection].style.opacity = 1;
                sections[currentSection].style.transform = 'scale(1)';
            }
        });
    </script>
</body>
</html>
