<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ruan Lisboa | Arquiteto de Fronteiras</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400&family=JetBrains+Mono:wght@300&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            background: #050505; color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        /* Efeito Zoom inicial */
        .hero { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            scroll-snap-align: start; transition: transform 1s ease;
        }
        .hero h1 { font-family: 'JetBrains Mono', monospace; font-size: 5rem; transform: scale(1); transition: transform 0.8s ease-out; }
        .hero.zoom-out h1 { transform: scale(0.5); }

        /* Container Lateral */
        .horizontal-container {
            height: 100vh; display: flex; overflow-x: auto;
            scroll-snap-type: x mandatory; scroll-snap-align: start;
        }
        .slide { 
            min-width: 100vw; height: 100vh; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            scroll-snap-align: center;
        }
    </style>
</head>
<body>

    <section class="hero" id="hero">
        <h1>Ruan Lisboa</h1>
    </section>

    <div class="horizontal-container">
        <section class="slide">
            <div class="manifesto">"A complexidade é apenas uma ignorância temporária..."</div>
        </section>
        <section class="slide">
            <h2>🔭 Frontier Science</h2>
            <p>mebe & SEEV</p>
        </section>
        <section class="slide">
            <h2>⚙️ Sistemas Ciberfísicos</h2>
            <p>LARA & Automação</p>
        </section>
        <section class="slide">
            <h2>🧠 Dados & Inteligência</h2>
            <p>OncoTech</p>
        </section>
    </div>

    <script>
        // Efeito de zoom ao rolar
        window.addEventListener('scroll', () => {
            const hero = document.getElementById('hero');
            if (window.scrollY > 50) { hero.classList.add('zoom-out'); } 
            else { hero.classList.remove('zoom-out'); }
        });
    </script>
</body>
</html>
