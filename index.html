<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .section { height: 100vh; display: flex; align-items: center; justify-content: center; opacity: 0; }
        #hero { opacity: 1; }
    </style>
</head>
<body>

    <section class="section" id="hero"><h1>Ruan Lisboa</h1></section>
    <section class="section"><h2>Frontier Science</h2></section>
    <section class="section"><h2>Sistemas Ciberfísicos</h2></section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Animação que "limpa" a tela conforme você rola
        gsap.utils.toArray(".section").forEach((section, i) => {
            gsap.to(section, {
                opacity: 1,
                scrollTrigger: {
                    trigger: section,
                    start: "top center",
                    toggleActions: "play reverse play reverse"
                }
            });
        });
    </script>
</body>
</html>
