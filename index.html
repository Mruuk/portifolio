<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Container principal para o efeito de rolagem */
        .page { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }

        /* Texto Centralizado e Minimalista */
        .hero { text-align: center; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: transform 0.1s ease-out; width: 100%; }
        h1 { font-size: 4rem; margin: 0; }
        p { font-size: 1rem; opacity: 0.7; margin-top: 10px; }

        /* Seções de conteúdo que virão após o scroll */
        .content { height: 100vh; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    </style>
</head>
<body>

    <div class="hero" id="hero">
        <h1>Ruan Lisboa</h1>
        <p>A complexidade é uma ignorância temporária.</p>
    </div>

    <div style="height: 300vh;"></div>

    <script>
        window.addEventListener('scroll', () => {
            const hero = document.getElementById('hero');
            const scroll = window.scrollY;
            
            // O zoom out: começa em 1, vai até 0.4
            let scale = Math.max(0.4, 1 - (scroll / 600));
            hero.style.transform = `translate(-50%, -50%) scale(${scale})`;
            
            // Fade out do texto conforme desce
            hero.style.opacity = Math.max(0, 1 - (scroll / 400));
        });
    </script>
</body>
</html>
